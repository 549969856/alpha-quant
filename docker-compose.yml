version: "3.9"

services:
  # ─── PostgreSQL (relational: users, models, predictions) ───────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: alphaquant
      POSTGRES_USER: aq_user
      POSTGRES_PASSWORD: aq_secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aq_user -d alphaquant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── TimescaleDB (time-series: OHLCV market data) ───────────────────
  timescale:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: alphaquant_ts
      POSTGRES_USER: ts_user
      POSTGRES_PASSWORD: ts_secret
    volumes:
      - ts_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # ─── Redis (Celery broker + result backend + cache) ─────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # ─── Django Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --database default &&
             python manage.py migrate --database timescale market_data &&
             python manage.py seed_features &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    environment:
      DATABASE_URL: postgres://aq_user:aq_secret@postgres:5432/alphaquant
      TIMESCALE_URL: postgres://ts_user:ts_secret@timescale:5432/alphaquant_ts
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-prod
      DEBUG: "false"
      ALLOWED_HOSTS: "*"
    volumes:
      - ./backend:/app
      - model_artifacts:/app/artifacts
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ─── Celery Worker (ML training & heavy tasks) ───────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A config worker -l info -Q training,prediction,data_fetch --concurrency 2
    environment:
      DATABASE_URL: postgres://aq_user:aq_secret@postgres:5432/alphaquant
      TIMESCALE_URL: postgres://ts_user:ts_secret@timescale:5432/alphaquant_ts
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-prod
    volumes:
      - ./backend:/app
      - model_artifacts:/app/artifacts
    depends_on:
      - backend
      - redis

  # ─── Celery Beat (scheduled market data sync) ────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DATABASE_URL: postgres://aq_user:aq_secret@postgres:5432/alphaquant
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-prod
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  # ─── Flower (Celery monitoring) ──────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config flower --port=5555
    environment:
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-prod
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ─── React Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
  ts_data:
  redis_data:
  model_artifacts:
